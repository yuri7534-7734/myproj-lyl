<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>계산기</title>
    <style>
      #wrap {
        border: 1px solid black;
        width: 400px;
        height: 650px;
        padding: 0;
        margin: 0 auto;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .calc {
        display: flex;
        flex-direction: column;
        margin: 10px;
        padding: 10px;
        justify-items: center;
        align-items: center;
      }
      h3 {
        font-size: 25px;
      }
      .num {
        width: 300px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
      }
      label {
        font-size: 20px;
      }
      #num1,
      #num2 {
        height: 30px;
        width: 200px;
        border: 1px solid gray;
        background-color: rgb(224, 224, 224);
        font-size: 22px;
        text-align: center;
      }
      #result {
        height: 30px;
        width: 200px;
        border: 1px solid gray;
        background-color: rgb(99, 98, 98);
        font-size: 22px;
        color: white;
        text-align: center;
        padding-right: 0;
      }
      #btn-group {
        display: flex;
        flex-direction: column;
        justify-items: center;
        align-items: center;
        padding: 10px;
      }
      button {
        width: 300px;
        height: 50px;
        text-align: center;
        margin-bottom: 10px;
      }
      #add,
      #sub,
      #mul,
      #div {
        background-color: rgb(99, 139, 247);
        color: white;
        font-size: 18px;
        border: none;
        cursor: pointer;
      }
      #del {
        background-color: rgb(247, 99, 99);
        color: white;
        font-size: 18px;
        border: none;
        cursor: pointer;
      }
    </style>
    <script>
      //onload 이벤트 핸들러
      //웹페이지의 모든 요소가 다 로딩된 후 실행되는 함수
      //브라우저가 HTML을 읽는다
      //CSS, 이미지, JS 등 모든 리소스를 로딩한다
      // 모든 로딩이 끝나면 window.onload 실행

      window.onload = function () {
        var num1 = document.getElementById("num1"); //HTML input 요소를 JS에서 사용하기 위해 자바스크립트 변수로 가져오는 것
        var num2 = document.getElementById("num2");
        var result = document.getElementById("result");
        var add = document.getElementById("add");
        var sub = document.getElementById("sub");
        var mul = document.getElementById("mul");
        var div = document.getElementById("div");
        var del = document.getElementById("del");

        //덧셈 버튼
        add.onclick = function () {
          //add 버튼이 존재해야 연결할 수 있다.
          //등록만 해두고, 사용자가 add 버튼 클릭했을 때 실행

          //HTML Form태그 + 자바스크립트 submit()함수 방법
          //let calType = document.getElementById("calType");
          //calType.value = "add";
          //submit_form();
          fetch_form("add");
        };
        //뺄셈 버튼
        sub.onclick = function () {
          //let calType = document.getElementById("calType");
          //calType.value = "sub";
          //submit_form();
          fetch_form("sub");
        };
        //곱셈 버튼
        mul.onclick = function () {
          //let calType = document.getElementById("calType");
          //calType.value = "mul";
          //submit_form();
          fetch_form("mul");
        };
        //나눗셈 버튼
        div.onclick = function () {
          //let calType = document.getElementById("calType");
          //calType.value = "div";
          //submit_form();
          fetch_form("div");
        };
        //지우기 버튼
        del.onclick = function () {
          result.value = "";
          num1.value = "";
          num2.value = "";
        };
      };

      function submit_form() {
        console.log("submit_form");
        //form 이라는 변수는 <form> 태그 자체가 된다.
        let form = document.formCalc; //name="formCalc"인 form 태그를 가져와라 : <form name="formCalc">
        //HTML form 태그 객체이기 때문에 속성을 바꿀 수 있다.
        form.action = "/calc-submit"; //    action = "/calc"(계산기 화면 보여주는 페이지)
        // => action = "/calc-submit"(계산 처리하는 서버 로직)으로 주소별로 기능을 나누기 위해
        form.method = "get";
        form.submit(); //요청은 /calc-submit으로 간다.
      }
      //fetch함수 사용
      function fetch_form(calTypeValue) {
        //연산 버튼을 눌렀을 때 실행되는 fetch 요청(JSON)함수
        //위쪽에서 onclick이 작동하면 = fetch_form("add") 이런식으로 들어온다.
        console.log("fetch_form");
        fetch("/calc-fetch", {
          //calc-fetch 주소로 서버 요청을 보낸다.
          //@PostMapping("/calc-fetch")
          method: "POST", //POST 방식으로 서버에 데이터를 보낸다.
          //GET은 URL로 보내지만, POST는 body에 데이터를 담는다.
          headers: { "Content-Type": "application/json" }, //지금 보내는 데이터는 JSON 형식이다.라고 서버에게 말하는 것
                                                           //그래야 Spring이 @RequestBody resDto dto 이런식으로 JSON -> DTO로 자동 변환한다.

          // JSON.stringify() 핵심구간 : 서버로 보내는 해당 데이터
          //버튼을 누르면 실제로 서버로 가는 데이터는
          // {
          //   "num1": "2",
          //   "num2": "3",
          //   "calType": "add"
          // }
          //JSON.stringfy()는 자바스크립트 객체를 JSON 문자열로 변환한다.
          body: JSON.stringify({
            num1: document.getElementById("num1").value, // ex) " 10 "
            num2: document.getElementById("num2").value,
            calType: calTypeValue,
          }),
        })

          //fetch가 서버에서 받는 response는 아직 데이터가 아니기 때문에 변환 하는 과정.
          //서버가 보내준 HTTP 응답
          // status: 200
          // body: { "status" : "ok", "result" : 5 }
          .then((response) => {
            console.log(response);
            return response.json(); //return response.json(); = 서버 응답을 JS 객체로 변환(=문자열을 객체로 변환)
            // 서버 응답
            // { "status" : "ok", "result" : 5 }
            // JS 객체
            // { status: "ok", result: 5 }
          })
          //JSON 문자열 { status : "ok", result : 5 }
          .then((json) => {
            //실제 데이터 사용
            console.log(json);
            result.value = json.result;
            //result input value에 결과값 넣기
            //result input = 5
          })
          //에러 처리
          .catch((error) => {
            console.log(error);
          });
      }
    </script>
  </head>
  <body>
    <div id="wrap">
      <div class="calc">
        <h3>계산기</h3>
        <!-- get 요청 : 주소줄에 파라미터가 달려서 들어간다. -->
        <!-- post, put, delete는 body에 데이터가 들어간다.-->
        <!-- action="/calc" 폼을 제출하면 /calc 주소로 요청을 보낸다. -->
        <!-- http://localhost:8080/calc -->
        <!-- #중요 name="formCalc" 이 form 이름을 formCalc라고 정한다. -->
        <!-- document.formCalc = document 안에 있는 name="formCalc" 폼을 의미  -->
        <!-- method="get" 데이터를 GET 방식으로 보낸다는 뜻 -->
        <form action="/calc-submit" name="formCalc" method="get">
          <div class="num 1">
            <label>숫자 1</label>
            <input type="text" id="num1" name="num1" th:value="${num1}" />
          </div>
          <div class="num 2">
            <label>숫자 2</label>
            <input type="text" id="num2" name="num2" th:value="${num2}" />
          </div>
          <!-- 화면에 보이지 않는 input        서버로 보내는 파라미터 이름       value="" : 실제 전송되는 값-->
          <input type="hidden" id="calType" name="calType" value="" />
          <div id="res" class="num 3">
            <label>연산 결과</label>
            <input
              type="number"
              id="result"
              disabled="disabled"
              th:value="${result}"
            />
          </div>
          <br />
          <div id="btn-group">
            <button type="button" id="add">덧셈</button>
            <button type="button" id="sub">뺄셈</button>
            <button type="button" id="mul">곱셈</button>
            <button type="button" id="div">나눗셈</button>
            <button type="button" id="del">지우기</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
