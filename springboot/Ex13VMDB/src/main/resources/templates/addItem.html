<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>자판기 프로그램</title>
    <style>
      body {
        background-color: brown;
      }
      #wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px;
        margin: 0 auto;
        width: 700px;
        height: auto;
        box-sizing: content-box;
      }
      #wrap h2 {
        color: white;
        font-size: 25px;
      }
      .listTitle {
        width: 600px;
      }
      .listTitle h2 {
        text-align: center;
      }
      label {
        font-weight: bolder;
        font-size: 20px;
        margin-bottom: 10px;
      }
      #dbListwrap {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .dbListName {
        display: flex;
        flex-direction: column;
        align-content: space-between;
        justify-items: center;
        background-color: white;
        width: 600px;
        height: auto;
        padding-top: 30px;
        padding-bottom: 20px;
        border-radius: 8px;
      }
      .list {
        width: 550px;
        display: flex;
        flex-direction: column;
        margin-left: 20px;
      }
      input {
        width: 550px;
        height: 40px;
        margin-bottom: 30px;
        border-radius: 5px;
        border: 1px solid rgb(201, 201, 201);
        outline: none;
      }
      .bottonAlign {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 20px;
      }

      #save {
        width: 100px;
        height: 50px;
        background-color: rgb(255, 199, 199);
        color: rgb(119, 21, 21);
        border-radius: 8px;
        font-weight: bolder;
        font-size: 15px;
        border: 1px solid rgb(119, 21, 21);
        cursor: pointer;
        margin-left: 20px;
        text-decoration: none;
      }
      #back {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100px;
        height: 50px;
        background-color: rgb(95, 95, 95);
        color: white;
        border-radius: 8px;
        font-weight: bolder;
        font-size: 15px;
        cursor: pointer;
        border: 1px solid rgb(78, 78, 78);
        margin-bottom: 21px;
        margin-right: 15px;
      }
      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div>
        <h2>자판기 상품을 추가해주세요</h2>
      </div>
      <div id="dbListwrap">
        <div class="dbListName">
          <form action="/getAddItem" method="get">
            <div class="list">
              <label for="product_name">상품명</label>
              <input
                type="text"
                id="product_name"
                name="product_name"
                th:value="${product_name}"
                placeholder="상품명을 입력해주세요."
              />
            </div>
            <div class="list">
              <label for="product_price">가격</label>
              <input
                type="number"
                id="product_price"
                name="product_price"
                th:value="${product_price}"
                placeholder="가격을 입력해주세요."
              />
            </div>
            <div class="list">
              <label for="product_limit_date">유통기한</label>
              <input
                type="date"
                id="product_limit_date"
                name="product_limit_date"
                th:value="${product_limit_date}"
                placeholder="유통기한을 입력해주세요."
              />
            </div>
            <button type="submit" id="save">Save</button>
          </form>
        </div>
      </div>
      <div class="bottonAlign">
        <a th:href="@{ /listForm }">
          <button id="back">Back</button>
        </a>
      </div>
    </div>
  </body>
</html>
