<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>자판기 프로그램</title>
    <style>
      body {
        background-color: brown;
      }
      #wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px;
        margin: 0 auto;
        width: 700px;
        height: auto;
        box-sizing: content-box;
      }
      a {
        text-decoration: none;
      }
      .name {
        margin-bottom: 21px;
      }
      #wrap h2 {
        color: white;
        font-size: 25px;
      }
      .BottomAlign {
        display: flex;
      }
      .dbListName {
        display: flex;
      }
      .dbListBottom h4 {
        width: 300px;
        height: 40px;
        background-color: white;
        color: brown;
        font-weight: bolder;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .dbTable {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: white;
        width: 650px;
        height: auto;
        padding-bottom: 20px;
        border-radius: 8px;
      }
      .dbTable {
        color: black;
      }
      table {
        border: 1px solid rgb(192, 191, 191);
        padding: 20px;
        width: 600px;
        height: auto;
        text-align: center;
      }
      td {
        font-weight: bolder;
      }
      .dbListName span {
        color: black;
      }
      .dbListBottom span {
        color: black;
        font-weight: bolder;
      }
      .bottomButton {
        clear: both;
        width: 100px;
        height: 50px;
        background-color: rgb(255, 231, 231);
        color: rgb(119, 21, 21);
        border-radius: 8px;
        font-weight: bolder;
        font-size: 15px;
        border: none;
        cursor: pointer;
      }

      #listButton {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 120px;
        height: 50px;
        background-color: rgb(212, 212, 212);
        color: rgb(119, 21, 21);
        border-radius: 8px;
        font-weight: bolder;
        font-size: 15px;
        cursor: pointer;
        border: none;
        margin-bottom: 21px;
        margin-right: 15px;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div class="name">
        <h2>자판기 프로그램</h2>
      </div>
      <div class="dbTable">
        <h3>상품 목록이 비어있습니다.</h3>
        <table>
          <tr>
            <td>번호</td>
            <td>상품명</td>
            <td>가격</td>
            <td>유통기한</td>
            <td>수정</td>
            <td>삭제</td>
          </tr>
        </table>
      </div>
      <div class="dbListBottom">
        <h4>▲ (oﾟvﾟ)ノ 총 <span>&nbsp;1&nbsp;</span>개의 상품이 있습니다 ▲</h4>
      </div>
      <div class="BottomAlign">
        <div class="dbListName">
          <a th:href="@{ /listForm }">
            <button id="listButton">
              <span>상품 목록 보기</span>
            </button>
          </a>
          <button class="bottomButton">Add Item</button>
        </div>
      </div>
    </div>
  </body>
</html>
