<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Login LeeYuri</title>
  </head>
  <style>
    #wrap {
      width: 500px;
      height: auto;
      padding: 0;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-weight: bolder;
      padding: 100px 0 20px 0;
    }
    #checkEmail {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    input {
      width: 330px;
      height: 35px;
      border: 1px solid rgb(168, 168, 168);
      color: rgb(37, 37, 37);
      outline: none;
      border-radius: 20px;
      margin-bottom: 10px;
      padding-left: 15px;
    }
    #memberUsername {
      width: 240px;
      height: 35px;
      border: 1px solid rgb(168, 168, 168);
      color: rgb(37, 37, 37);
      outline: none;
      border-radius: 20px;
      margin-bottom: 10px;
      padding-left: 15px;
      margin-right: 10px;
    }
    #idCheckAlert {
      width: 330px;
      height: 35px;
      background-color: rgb(37, 37, 37);
      border: 1px solid rgb(168, 168, 168);
      color: white;
      outline: none;
      border-radius: 20px;
      margin-bottom: 10px;
      padding-left: 15px;
    }
    #usernameResult {
      width: 340px;
      height: 40px;
      display: none;
      color: white;
      padding-left: 15px;
      border: none;
      background-color: rgb(0, 14, 36);
      border-radius: 20px;
      margin-bottom: 10px;
      font-weight: bolder;
      font-size: 13px;
      cursor: pointer;
    }
    #sameCheck {
      width: 80px;
      height: 35px;
      border-radius: 30px;
      outline: none;
      color: white;
      border: none;
      background-color: rgb(32, 110, 255);
      cursor: pointer;
    }
    #login {
      width: 352px;
      height: 40px;
      color: rgb(32, 110, 255);
      border: 1px solid rgb(32, 110, 255);
      font-weight: bolder;
      background-color: rgb(255, 255, 255);
      border-radius: 20px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .findMember {
      display: flex;
      justify-content: center;
    }
    a {
      color: rgb(131, 131, 131);
      text-decoration: none;
      font-size: 11px;
    }
  </style>
  <script>
    function api_check2() {
      const loginCheck = document.getElementById("memberUsername");
      const memberNo = document.getElementById("memberNo");
      if (loginCheck.value == "") {
        alert("아이디를 입력해주세요");
        return;
      }
      fetch("http://localhost:8080/update-username", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          memberUsername: loginCheck.value,
          memberNo: memberNo.value,
        }),
      })
        .then((response) => {
          console.log(response);
          return response.json();
        })
        .then((json) => {
          const result = document.getElementById("usernameResult");

          if (json.isDuplicate) {
            result.style.display = "flex";
            result.style.alignItems = "center";
            result.style.justifyContent = "center";
            result.innerText = "다른 아이디를 사용해주세요";
          } else {
            result.style.display = "flex";
            result.style.alignItems = "center";
            result.style.justifyContent = "center";
            result.innerText = "사용 가능한 아이디입니다";
          }
        })
        .catch((error) => {
          console.log("에러확인");
        });
    }
    function checkValue() {
      if (!document.signUpForm.memberEmail.value) {
        alert("이메일이 유효하지 않습니다.");
        return false;
      }
      if (!document.signUpForm.memberUsername.value) {
        alert("아이디가 유효하지 않습니다.");
        return false;
      }
      if (!document.signUpForm.memberPassword.value) {
        alert("비밀번호가 유효하지 않습니다.");
        return false;
      }

      return true;
    }
  </script>
  <body>
    <div id="wrap">
      <div id="topLogin">
        <h1>Update Member</h1>
      </div>
      <div id="inputLogin">
        <form
          action="/updateForm"
          name="signUpForm"
          method="post"
          onsubmit="return checkValue();"
        >
          <input
            type="hidden"
            name="memberNo"
            id="memberNo"
            th:value="${dto.memberNo}"
          />
          <div id="usernameResult"></div>
          <div id="checkEmail">
            <div class="idCheck">
              <input
                type="text"
                name="memberUsername"
                id="memberUsername"
                th:value="${dto.memberUsername}"
              />
              <button type="button" onclick="api_check2()" id="sameCheck">
                중복 확인
              </button>
            </div>

            <input
              type="text"
              name="memberPassword"
              id="memberPassword"
              th:value="${dto.memberPassword}"
            />
            <input
              type="text"
              name="memberEmail"
              id="memberEmail"
              th:value="${dto.memberEmail}"
            />
            <input
              type="date"
              name="memberJoindate"
              id="memberJoindate"
              th:value="${dto.memberJoindate}"
              readonly
            />
            <button type="submit" id="login">업데이트</button>
          </div>
        </form>
      </div>
      <div class="findMember">
        <a th:href="@{ /admin }">업데이트 안할래요</a>
      </div>
    </div>
  </body>
</html>
