<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수강신청</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <span class="logo">수강신청</span>
      <a
        href="/admin"
        style="margin-left: auto; text-decoration: none; font-weight: bold"
        >과목관리</a
      >
    </header>

    <main>
      <div class="section-title">개설 과목 목록</div>
      <div id="course-list" class="course-list"></div>

      <div class="section-title" style="margin-top: 30px">신청한 과목</div>
      <div id="registered-list" class="registered-list"></div>
    </main>

    <script>
      const defaultCourses = [
        {
          id: 3,
          name: "자료구조",
          professor: "김철수",
          time: "월/수 09:00",
          credits: 3,
        },
        {
          id: 6,
          name: "운영체제",
          professor: "이영희",
          time: "화/목 10:30",
          credits: 3,
        },
        {
          id: 7,
          name: "데이터베이스",
          professor: "박민준",
          time: "월/수 13:00",
          credits: 3,
        },
      ];

      function getCourses() {
        const saved = localStorage.getItem("courses");
        if (!saved) {
          localStorage.setItem("courses", JSON.stringify(defaultCourses));
          return defaultCourses;
        }
        return JSON.parse(saved);
      }

      async function getRegisteredFromDb() {
        const res = await fetch("/api/register");
        if (!res.ok) {
          throw new Error("수강신청 목록 조회 실패");
        }
        return await res.json();
      }

      async function render() {
        const courses = getCourses();
        const registered = await getRegisteredFromDb();

        const courseList = document.getElementById("course-list");
        const registeredList = document.getElementById("registered-list");

        courseList.innerHTML = "";
        registeredList.innerHTML = "";

        courses.forEach((course) => {
          const isRegistered = registered.some(
            (r) => Number(r.courseId) === course.id,
          );

          const div = document.createElement("div");
          div.className = "course-card";
          div.innerHTML = `
        <div class="course-info">
          <div class="course-name">${course.name}</div>
          <div class="course-details">
            <span>교수: ${course.professor}</span>
            <span>시간: ${course.time}</span>
            <span>학점: ${course.credits}</span>
          </div>
        </div>
        <button class="register-btn" ${isRegistered ? "disabled" : ""} onclick="registerCourse(${course.id})">
          ${isRegistered ? "신청완료" : "신청"}
        </button>
      `;
          courseList.appendChild(div);
        });

        const registeredCourses = registered
          .map((reg) => {
            const course = courses.find((c) => c.id === Number(reg.courseId));
            if (!course) return null;
            return {
              ...course,
              registration_id: reg.registration_id,
            };
          })
          .filter(Boolean);

        if (registeredCourses.length === 0) {
          registeredList.innerHTML = `<div class="empty-state">신청한 과목이 없습니다.</div>`;
        } else {
          registeredCourses.forEach((course) => {
            const div = document.createElement("div");
            div.className = "registered-card";
            div.innerHTML = `
          <div class="course-info">
            <div class="course-name">${course.name}</div>
            <div class="course-details">
              <span>교수: ${course.professor}</span>
              <span>시간: ${course.time}</span>
              <span>학점: ${course.credits}</span>
            </div>
          </div>
          <button class="remove-btn" onclick="cancelCourse(${course.registration_id})">취소</button>
        `;
            registeredList.appendChild(div);
          });
        }
      }

      async function registerCourse(courseId) {
        try {
          const res = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              courseId: courseId,
            }),
          });

          if (!res.ok) {
            const text = await res.text();
            alert("신청 실패 : " + text);
            return;
          }
          await render();
        } catch (e) {
          alert("신청 중 오류가 발생했습니다.");
          console.error(e);
        }
      }

      async function cancelCourse(registrationId) {
        try {
          const res = await fetch(`/api/register/${registrationId}`, {
            method: "DELETE",
          });

          if (!res.ok) {
            alert("취소 실패");
            return;
          }

          await render();
        } catch (e) {
          alert("취소 중 오류가 발생했습니다.");
          console.error(e);
        }
      }
      render();
    </script>
  </body>
</html>
