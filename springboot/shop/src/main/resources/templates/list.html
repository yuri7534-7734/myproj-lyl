<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <link href="/main.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{nav.html::navbar}"></div>

<div class="card" th:each="card : ${items} ">
  <img src="https://placehold.co/300">
  <div>
    <h4 th:text="${card.title}">바지</h4>
    <p th:text="${card.price}+'원'">7억</p>
  </div>
</div>

</body>
</html>
